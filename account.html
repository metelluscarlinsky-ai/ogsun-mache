<!DOCTYPE html>
<html lang="ht" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Kont Mwen</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit',Arial,sans-serif;background:#0a0a0a;color:#fff;line-height:1.6}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1rem 2rem;background:rgba(10,10,10,0.95);border-bottom:1px solid rgba(255,255,255,0.08)}
        .nav-container{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .logo-wrapper{display:flex;align-items:center;gap:0.75rem;text-decoration:none}
        .logo-img{width:50px;height:50px;object-fit:contain}
        .logo-text{font-family:'Space Grotesk',Arial,sans-serif;font-size:1.75rem;font-weight:700;color:#d4af37;letter-spacing:3px;text-transform:uppercase}
        .nav-links{display:flex;gap:1.5rem;align-items:center}
        .nav-link{color:#a0a0a0;text-decoration:none;font-weight:500;font-size:0.9rem}
        .nav-link:hover,.nav-link.active{color:#d4af37}
        .primary-btn{background:linear-gradient(135deg,#d4af37,#f4d03f);color:#0a0a0a;border:none;padding:0.75rem 2rem;border-radius:50px;font-weight:600;cursor:pointer;text-decoration:none}
        
        .account-page{padding:8rem 2rem 4rem;max-width:500px;margin:0 auto}
        .account-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:2.5rem}
        .account-card h1{font-family:'Space Grotesk',Arial,sans-serif;text-align:center;margin-bottom:0.5rem;color:#d4af37}
        .account-card p{text-align:center;color:#a0a0a0;margin-bottom:2rem;font-size:0.9rem}
        
        .tab-btns{display:flex;gap:0.5rem;margin-bottom:2rem}
        .tab-btn{flex:1;padding:0.75rem;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#a0a0a0;border-radius:10px;cursor:pointer;font-weight:500;transition:all 0.3s}
        .tab-btn.active{background:#d4af37;color:#0a0a0a;border-color:#d4af37}
        
        .form-group{margin-bottom:1.25rem}
        .form-group label{display:block;color:#a0a0a0;margin-bottom:0.5rem;font-size:0.9rem}
        .form-group input{width:100%;padding:1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:'Outfit',Arial,sans-serif;font-size:1rem}
        .form-group input:focus{outline:none;border-color:#d4af37}
        
        .submit-btn{width:100%;background:linear-gradient(135deg,#d4af37,#f4d03f);color:#0a0a0a;border:none;padding:1rem;border-radius:25px;font-weight:bold;font-size:1.1rem;cursor:pointer;transition:all 0.3s}
        .submit-btn:hover{transform:translateY(-2px)}
        
        .logout-btn{width:100%;background:transparent;border:1px solid #ff4444;color:#ff4444;padding:1rem;border-radius:25px;font-weight:bold;font-size:1rem;cursor:pointer;margin-top:1rem}
        .logout-btn:hover{background:rgba(255,68,68,0.1)}
        
        .msg{padding:1rem;border-radius:10px;margin-bottom:1rem;display:none;text-align:center;font-weight:500}
        .msg.error{display:block;background:rgba(255,68,68,0.1);border:1px solid #ff4444;color:#ff4444}
        .msg.success{display:block;background:rgba(76,175,80,0.1);border:1px solid #4caf50;color:#4caf50}
        
        .profile-info{text-align:center}
        .profile-avatar{width:80px;height:80px;background:linear-gradient(135deg,#d4af37,#f4d03f);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2.5rem}
        .profile-info h2{font-family:'Space Grotesk',Arial,sans-serif;margin-bottom:0.5rem}
        .profile-info p{color:#a0a0a0;margin-bottom:0.25rem}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper">
                  <img src="https://ogsun-mache-lakay-blqd.onrender.com/logo.png" alt="OGSUN" class="logo-img">
                <span class="logo-text">OGSUN</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 Akèy</a>
                <a href="shop.html" class="nav-link">🛍️ Boutik</a>
                <a href="cart.html" class="nav-link">🛒 Panye</a>
                <a href="account.html" class="nav-link active">👤 Kont</a>
            </div>
            <a href="index.html" class="primary-btn">Akèy</a>
        </div>
    </nav>

    <main class="account-page">
        
        <!-- PA KONEKTE - FÒM LOGIN/REGISTER -->
        <div id="authSection" class="account-card">
            <h1>👤 Kont OGSUN</h1>
            <p>Konekte oswa kreye yon nouvo kont</p>
            
            <div class="tab-btns">
                <button class="tab-btn active" onclick="showAuthTab('login')">🔓 Konekte</button>
                <button class="tab-btn" onclick="showAuthTab('register')">✨ Kreye Kont</button>
            </div>
            
            <div class="msg" id="authMsg"></div>
            
            <!-- FÒM LOGIN -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>📧 Imèl</label>
                    <input type="email" id="loginEmail" placeholder="Antre imèl ou" required>
                </div>
                <div class="form-group">
                    <label>🔑 Modpas</label>
                    <input type="password" id="loginPassword" placeholder="Antre modpas ou" required>
                </div>
                <button type="submit" class="submit-btn">🔓 Konekte</button>
            </form>
            
            <!-- FÒM REGISTER (KACHE PA DEFO) -->
            <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>👤 Non konplè *</label>
                    <input type="text" id="regName" placeholder="Antre non w" required>
                </div>
                <div class="form-group">
                    <label>📧 Imèl *</label>
                    <input type="email" id="regEmail" placeholder="Antre imèl ou" required>
                </div>
                <div class="form-group">
                    <label>📱 Telefòn</label>
                    <input type="tel" id="regPhone" placeholder="+509 0000 0000">
                </div>
                <div class="form-group">
                    <label>🔑 Modpas *</label>
                    <input type="password" id="regPassword" placeholder="Kreye yon modpas" required>
                </div>
                <div class="form-group">
                    <label>🔑 Konfime Modpas *</label>
                    <input type="password" id="regConfirm" placeholder="Tape modpas la ankò" required>
                </div>
                <button type="submit" class="submit-btn">✨ Kreye Kont</button>
            </form>
        </div>
        
        <!-- KONEKTE - PWOFIL -->
        <div id="profileSection" class="account-card" style="display:none;">
            <div class="profile-info">
                <div class="profile-avatar">👤</div>
                <h2 id="profileName">---</h2>
                <p id="profileEmail">---</p>
                <p id="profilePhone">---</p>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Dekonekte</button>
        </div>
    </main>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    var currentTab = 'login';
    
    // Tcheke si itilizatè konekte
    var userToken = localStorage.getItem('ogsun-user-token');
    var userData = JSON.parse(localStorage.getItem('ogsun-user-data') || 'null');
    
    if (userToken && userData) {
        showProfile();
    }
    
    function showAuthTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        event.target.classList.add('active');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        hideMsg();
    }
    
    function showMsg(type, message) {
        var msg = document.getElementById('authMsg');
        msg.className = 'msg ' + type;
        msg.textContent = message;
    }
    
    function hideMsg() {
        document.getElementById('authMsg').className = 'msg';
    }
    
    // LOGIN
    function handleLogin(event) {
        event.preventDefault();
        hideMsg();
        
        var email = document.getElementById('loginEmail').value.trim();
        var password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showMsg('error', '❌ Ranpli tout chan yo!');
            return;
        }
        
        showMsg('success', '⏳ Koneksyon...');
        
        fetch(API + '/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                localStorage.setItem('ogsun-user-token', data.token);
                localStorage.setItem('ogsun-user-data', JSON.stringify(data.user));
                showMsg('success', '✅ Byenveni ' + data.user.name + '!');
                setTimeout(function() { showProfile(); }, 500);
            } else {
                showMsg('error', '❌ ' + (data.error || 'Imèl oswa modpas pa bon!'));
            }
        })
        .catch(function() {
            showMsg('error', '❌ Pa ka konekte ak sèvè a.');
        });
        
        return false;
    }
    
    // REGISTER
    function handleRegister(event) {
        event.preventDefault();
        hideMsg();
        
        var name = document.getElementById('regName').value.trim();
        var email = document.getElementById('regEmail').value.trim();
        var phone = document.getElementById('regPhone').value.trim();
        var password = document.getElementById('regPassword').value;
        var confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password) {
            showMsg('error', '❌ Non, imèl, ak modpas obligatwa!');
            return;
        }
        
        if (password !== confirm) {
            showMsg('error', '❌ Modpas yo pa menm!');
            return;
        }
        
        if (password.length < 4) {
            showMsg('error', '❌ Modpas dwe gen omwen 4 karaktè!');
            return;
        }
        
        showMsg('success', '⏳ Kreasyon kont...');
        
        fetch(API + '/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, email: email, phone: phone, password: password })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                showMsg('success', '✅ Kont kreye! Ou ka konekte kounya.');
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPhone').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirm').value = '';
                setTimeout(function() { showAuthTab('login'); }, 1000);
            } else {
                showMsg('error', '❌ ' + (data.error || 'Erè kreasyon kont!'));
            }
        })
        .catch(function() {
            showMsg('error', '❌ Pa ka konekte ak sèvè a.');
        });
        
        return false;
    }
    
    // MONTRE PWOFIL
    function showProfile() {
        var userData = JSON.parse(localStorage.getItem('ogsun-user-data') || 'null');
        if (!userData) return;
        
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('profileSection').style.display = 'block';
        document.getElementById('profileName').textContent = userData.name || '---';
        document.getElementById('profileEmail').textContent = '📧 ' + (userData.email || '---');
        document.getElementById('profilePhone').textContent = '📱 ' + (userData.phone || '---');
    }
    
    // DEKONEKTE
    function logout() {
        localStorage.removeItem('ogsun-user-token');
        localStorage.removeItem('ogsun-user-data');
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('profileSection').style.display = 'none';
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        hideMsg();
    }
    
    console.log('✅ Account OGSUN pare!');
    </script>

</body>
</html>
