<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Kont Kliyan 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #c9a84c; --gold-light: #e2c86e; --bg: #08090a; --bg-card: #111215;
            --text: #e8e6e3; --text-secondary: #989694; --text-muted: #5c5a58;
            --border: rgba(255,255,255,0.04); --accent: #c9a84c; --accent-bg: rgba(201,168,76,0.08);
            --red: #e54b4b; --green: #3ecf8e; --radius: 16px; --radius-sm: 10px;
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5); --glow-gold: 0 0 30px rgba(201,168,76,0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { font-family: 'Outfit', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        
        .account-container { width: 100%; max-width: 480px; }
        .account-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem; box-shadow: var(--shadow-lg), var(--glow-gold); }
        .account-logo { text-align: center; margin-bottom: 1.5rem; }
        .account-logo .icon { width: 56px; height: 56px; background: linear-gradient(135deg, #8b6914, var(--gold-light)); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #000; font-weight: 800; font-family: 'Space Grotesk', sans-serif; box-shadow: var(--glow-gold); }
        .account-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 0.3rem; }
        .account-title span { color: var(--accent); }
        .account-subtitle { color: var(--text-muted); text-align: center; font-size: 0.85rem; margin-bottom: 1.8rem; }
        
        .tab-switch { display: flex; background: rgba(255,255,255,0.02); border-radius: 50px; padding: 3px; margin-bottom: 1.8rem; }
        .tab-btn { flex: 1; padding: 0.6rem; border: none; background: transparent; color: var(--text-muted); border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.82rem; transition: var(--transition); font-family: inherit; }
        .tab-btn.active { background: var(--accent); color: #000; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; color: var(--text-muted); margin-bottom: 0.3rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: inherit; font-size: 0.9rem; transition: var(--transition); }
        .form-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        
        .btn-submit { width: 100%; padding: 0.85rem; background: var(--accent); color: #000; border: none; border-radius: 50px; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: var(--transition); font-family: inherit; margin-top: 0.5rem; }
        .btn-submit:hover { background: var(--gold-light); box-shadow: var(--glow-gold); transform: translateY(-1px); }
        .btn-ghost { width: 100%; padding: 0.75rem; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: var(--transition); font-family: inherit; margin-top: 0.5rem; }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        
        .msg { padding: 0.8rem; border-radius: var(--radius-sm); margin-bottom: 1rem; text-align: center; font-weight: 500; font-size: 0.85rem; display: none; }
        .msg.error { display: block; background: rgba(229,75,75,0.08); color: var(--red); border: 1px solid rgba(229,75,75,0.2); }
        .msg.success { display: block; background: rgba(62,207,142,0.08); color: var(--green); border: 1px solid rgba(62,207,142,0.2); }
        
        /* ===== PANÈL KLIYAN ===== */
        .client-panel { display: none; }
        .client-header { text-align: center; margin-bottom: 2rem; }
        .client-avatar { width: 70px; height: 70px; background: linear-gradient(135deg, var(--accent), var(--gold-light)); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; color: #000; box-shadow: var(--glow-gold); }
        .client-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; margin-top: 0.8rem; }
        .client-email { color: var(--text-muted); font-size: 0.85rem; }
        
        .stats-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.5rem; }
        .stat-mini { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem; text-align: center; }
        .stat-mini .value { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); }
        .stat-mini .label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        
        .menu-links { display: flex; flex-direction: column; gap: 0.4rem; }
        .menu-link { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: var(--transition); cursor: pointer; }
        .menu-link:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
        .menu-link .icon { font-size: 1.1rem; }
        
        .logout-btn { width: 100%; padding: 0.7rem; background: transparent; color: var(--red); border: 1px solid rgba(229,75,75,0.2); border-radius: 50px; font-weight: 600; cursor: pointer; font-size: 0.85rem; margin-top: 1rem; transition: var(--transition); font-family: inherit; }
        .logout-btn:hover { background: rgba(229,75,75,0.08); }
        
        .back-link { display: block; text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.8rem; margin-top: 1rem; }
        .back-link:hover { color: var(--accent); }
        
        @media (max-width: 500px) { .account-card { padding: 1.5rem; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="account-container">
        
        <!-- FÒM LOGIN/REGISTER -->
        <div id="authSection" class="account-card">
            <div class="account-logo"><div class="icon">O</div></div>
            <h1 class="account-title">Kont <span>OGSUN</span></h1>
            <p class="account-subtitle">Antre nan mond pwodwi otantik ayisyen yo</p>
            
            <div class="tab-switch">
                <button class="tab-btn active" onclick="showTab('login')">Konekte</button>
                <button class="tab-btn" onclick="showTab('register')">Enskri</button>
            </div>
            
            <div class="msg" id="authMsg"></div>
            
            <!-- LOGIN -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group"><label>Imèl</label><input type="email" id="loginEmail" placeholder="imel@example.com" required></div>
                <div class="form-group"><label>Modpas</label><input type="password" id="loginPassword" placeholder="••••••••" required></div>
                <button type="submit" class="btn-submit">Konekte</button>
            </form>
            
            <!-- REGISTER -->
            <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group"><label>Non</label><input type="text" id="regName" placeholder="Antre non w" required></div>
                    <div class="form-group"><label>Siyati</label><input type="text" id="regLastName" placeholder="Antre siyati w"></div>
                </div>
                <div class="form-group"><label>Imèl</label><input type="email" id="regEmail" placeholder="imel@example.com" required></div>
                <div class="form-group"><label>Telefòn</label><input type="tel" id="regPhone" placeholder="+509 0000 0000"></div>
                <div class="form-group"><label>Modpas</label><input type="password" id="regPassword" placeholder="Kreye modpas (min 4 karaktè)" required></div>
                <button type="submit" class="btn-submit">Kreye Kont</button>
            </form>
        </div>
        
        <!-- PANÈL KLIYAN -->
        <div id="clientSection" class="account-card client-panel">
            <div class="client-header">
                <div class="client-avatar" id="clientInitials">?</div>
                <div class="client-name" id="clientName">---</div>
                <div class="client-email" id="clientEmail">---</div>
            </div>
            
            <div class="stats-mini">
                <div class="stat-mini"><div class="value" id="clientOrders">0</div><div class="label">Kòmand</div></div>
                <div class="stat-mini"><div class="value" id="clientPoints">0</div><div class="label">Pwen</div></div>
                <div class="stat-mini"><div class="value" style="color:var(--green);">VIP</div><div class="label">Nivo</div></div>
            </div>
            
            <div class="menu-links">
                <a href="orders.html" class="menu-link"><span class="icon">📋</span> Swivi Kòmand</a>
                <a href="cart.html" class="menu-link"><span class="icon">🛒</span> Panye mwen</a>
                <a href="shop.html" class="menu-link"><span class="icon">🛍</span> Ale nan Boutik</a>
                <a href="contact.html" class="menu-link"><span class="icon">✉</span> Kontakte Sipò</a>
            </div>
            
            <button class="logout-btn" onclick="logout()">Dekonekte</button>
            <a href="index.html" class="back-link">← Retounen sou Akèy</a>
        </div>
        
    </div>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    
    // Tcheke si deja konekte
    var userToken = localStorage.getItem('ogsun-user-token');
    var userData = JSON.parse(localStorage.getItem('ogsun-user-data') || 'null');
    
    if (userToken && userData) { showClientPanel(); }
    
    function showTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        event.target.classList.add('active');
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('authMsg').className = 'msg';
    }
    
    function showMsg(type, msg) {
        var el = document.getElementById('authMsg');
        el.className = 'msg ' + type;
        el.textContent = (type === 'error' ? '✕ ' : '✓ ') + msg;
    }
    
    function handleLogin(e) {
        e.preventDefault();
        var email = document.getElementById('loginEmail').value.trim();
        var pw = document.getElementById('loginPassword').value;
        if (!email || !pw) { showMsg('error', 'Ranpli tout chan yo!'); return; }
        showMsg('success', 'Koneksyon...');
        
        fetch(API + '/users/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: pw })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                localStorage.setItem('ogsun-user-token', d.token || 'user-token');
                localStorage.setItem('ogsun-user-data', JSON.stringify(d.user));
                showClientPanel();
            } else {
                showMsg('error', d.error || 'Imèl oswa modpas pa bon!');
            }
        })
        .catch(function() { showMsg('error', 'Pa ka konekte ak sèvè a.'); });
        return false;
    }
    
    function handleRegister(e) {
        e.preventDefault();
        var name = document.getElementById('regName').value.trim();
        var lastName = document.getElementById('regLastName').value.trim();
        var email = document.getElementById('regEmail').value.trim();
        var phone = document.getElementById('regPhone').value.trim();
        var pw = document.getElementById('regPassword').value;
        
        if (!name || !email || !pw) { showMsg('error', 'Non, imèl, ak modpas obligatwa!'); return; }
        if (pw.length < 4) { showMsg('error', 'Modpas dwe gen omwen 4 karaktè!'); return; }
        showMsg('success', 'Kreasyon kont...');
        
        fetch(API + '/users/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name + (lastName ? ' ' + lastName : ''), email: email, phone: phone, password: pw })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) {
                showMsg('success', 'Kont kreye! Ou ka konekte kounya.');
                document.getElementById('regName').value = '';
                document.getElementById('regLastName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPhone').value = '';
                document.getElementById('regPassword').value = '';
                setTimeout(function() { showTab('login'); }, 1500);
            } else {
                showMsg('error', d.error || 'Erè kreasyon kont!');
            }
        })
        .catch(function() { showMsg('error', 'Pa ka konekte ak sèvè a.'); });
        return false;
    }
    
    function showClientPanel() {
        var userData = JSON.parse(localStorage.getItem('ogsun-user-data') || 'null');
        if (!userData) return;
        
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('clientSection').style.display = 'block';
        
        document.getElementById('clientName').textContent = userData.name || 'Kliyan OGSUN';
        document.getElementById('clientEmail').textContent = userData.email || '';
        
        var initials = (userData.name || 'OG').split(' ').map(function(n) { return n.charAt(0).toUpperCase(); }).join('').slice(0, 2);
        document.getElementById('clientInitials').textContent = initials;
    }
    
    function logout() {
        localStorage.removeItem('ogsun-user-token');
        localStorage.removeItem('ogsun-user-data');
        location.reload();
    }
    </script>

</body>
</html>
