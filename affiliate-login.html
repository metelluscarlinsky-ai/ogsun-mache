<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Espas Afilye</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#c9a84c;--bg:#08090a;--card:#111215;--text:#e8e6e3;--gray:#989694;--red:#e54b4b;--green:#3ecf8e;--radius:16px}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
        .login-card{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:2.5rem;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5)}
        .login-card h1{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;color:var(--gold);margin-bottom:0.5rem}
        .login-card p{color:var(--gray);margin-bottom:1.5rem;font-size:0.9rem}
        .form-group{margin-bottom:1rem;text-align:left}
        .form-group label{display:block;color:var(--gray);margin-bottom:0.3rem;font-size:0.8rem;text-transform:uppercase;letter-spacing:1px}
        .form-group input{width:100%;padding:0.8rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;color:#fff;font-family:'Outfit',sans-serif;font-size:0.95rem}
        .form-group input:focus{outline:none;border-color:var(--gold)}
        .btn-login{width:100%;padding:0.9rem;background:var(--gold);color:#000;border:none;border-radius:50px;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.3s;margin-top:0.5rem}
        .btn-login:hover{background:#e2c86e;transform:translateY(-2px)}
        .msg{padding:0.7rem;border-radius:8px;margin-bottom:1rem;font-weight:500;font-size:0.85rem;display:none}
        .msg.error{display:block;background:rgba(229,75,75,0.1);color:var(--red);border:1px solid rgba(229,75,75,0.2)}
        .msg.success{display:block;background:rgba(62,207,142,0.1);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
        .back-link{display:block;margin-top:1rem;color:var(--gray);text-decoration:none;font-size:0.85rem}
        .back-link:hover{color:var(--gold)}
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🎫 Espas Afilye OGSUN</h1>
        <p>Antre kòd afilye w la pou wè dashboard ou</p>
        <div class="msg" id="msg"></div>
        <form id="loginForm">
            <div class="form-group"><label>Kòd Afilye</label><input type="text" id="affiliateCode" placeholder="OGSUN-PRO1" required autocomplete="off"></div>
            <div class="form-group"><label>Non (opsyonèl)</label><input type="text" id="affiliateName" placeholder="Antre non w si w vle" autocomplete="off"></div>
            <button type="submit" class="btn-login">Konekte</button>
        </form>
        <a href="index.html" class="back-link">← Retounen sou OGSUN</a>
    </div>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var code = document.getElementById('affiliateCode').value.trim().toUpperCase();
        var name = document.getElementById('affiliateName').value.trim();
        var msg = document.getElementById('msg');
        
        msg.className = 'msg';
        
        if (!code) { msg.className = 'msg error'; msg.textContent = '❌ Antre kòd afilye ou!'; return; }
        
        msg.className = 'msg success'; msg.textContent = '⏳ Koneksyon...';
        
        // Voye requèt API - verifye ak kòd sèlman
        fetch(API + '/promos/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code, name: name })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d && d.id) {
                // Siksè!
                msg.className = 'msg success';
                msg.textContent = '✅ Byenveni ' + d.affiliate_name + '!';
                localStorage.setItem('ogsun-affiliate-code', d.code);
                localStorage.setItem('ogsun-affiliate-name', d.affiliate_name);
                localStorage.setItem('ogsun-affiliate-data', JSON.stringify(d));
                setTimeout(function() { window.location.href = 'affiliate-dashboard.html'; }, 1000);
            } else {
                // Echèk
                msg.className = 'msg error';
                if (d.available_codes && d.available_codes.length > 0) {
                    msg.textContent = '❌ Kòd pa valab! Kòd ki disponib: ' + d.available_codes.slice(0, 5).join(', ');
                } else {
                    msg.textContent = '❌ ' + (d.error || 'Kòd pa valab!');
                }
            }
        })
        .catch(function(err) {
            console.log('Erè API:', err);
            msg.className = 'msg error';
            msg.textContent = '❌ Pa ka konekte ak sèvè a!';
        });
    });
    
    // Si deja konekte, ale dirèk
    (function() {
        var savedCode = localStorage.getItem('ogsun-affiliate-code');
        if (savedCode) {
            fetch(API + '/promos/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: savedCode })
            })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d && d.id) {
                    localStorage.setItem('ogsun-affiliate-data', JSON.stringify(d));
                    window.location.href = 'affiliate-dashboard.html';
                }
            })
            .catch(function() {});
        }
    })();
    </script>
</body>
</html>
