<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Boutik 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #b8960f; --gold-light: #d4af37; --bg: #fafaf9; --white: #fff; --text: #1a1a1a; --gray: #666; --border: #e8e0d0; --radius: 14px; }
        body { font-family: 'Outfit', 'Segoe UI', Arial, sans-serif; background: linear-gradient(180deg, #fafaf9 0%, #f5f0e8 50%, #efe8d8 100%); color: var(--text); line-height: 1.7; overflow-x: hidden; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 0.9rem 2rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo-wrapper { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .logo-img { width: 42px; height: 42px; object-fit: contain; border-radius: 8px; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { color: var(--gray); text-decoration: none; font-weight: 500; font-size: 0.88rem; transition: color 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--gold); }
        .nav-btn { background: var(--gold); color: #fff; border: none; padding: 0.6rem 1.6rem; border-radius: 50px; font-weight: 600; cursor: pointer; text-decoration: none; font-size: 0.88rem; }
        .nav-btn:hover { background: var(--gold-light); }
        .shop-page { padding: 7rem 2rem 3rem; max-width: 1300px; margin: 0 auto; }
        .shop-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .shop-title { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 800; }
        .shop-title span { color: var(--gold); }
        .search-box { display: flex; background: #fff; border: 1px solid var(--border); border-radius: 50px; overflow: hidden; }
        .search-box input { padding: 0.7rem 1.2rem; border: none; outline: none; font-family: 'Outfit', sans-serif; font-size: 0.9rem; min-width: 220px; background: transparent; }
        .search-box button { background: var(--gold); color: #fff; border: none; padding: 0.7rem 1.3rem; cursor: pointer; font-weight: 600; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 1.2rem; }
        .product-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all 0.3s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); border-color: var(--gold); }
        .product-img-wrap { aspect-ratio: 1; overflow: hidden; background: #f5f0e8; position: relative; }
        .product-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .product-card:hover .product-img { transform: scale(1.04); }
        .product-badge { position: absolute; top: 0.6rem; left: 0.6rem; background: var(--gold); color: #fff; padding: 0.2rem 0.7rem; border-radius: 50px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; z-index: 2; }
        .product-info { padding: 1rem 1.1rem; }
        .product-cat { color: var(--gold); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .product-name { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; margin: 0.3rem 0; font-weight: 600; }
        .product-price { display: flex; align-items: center; gap: 0.5rem; margin: 0.4rem 0; }
        .current-price { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
        .old-price { text-decoration: line-through; color: #aaa; font-size: 0.8rem; }
        .cart-btn { display: flex; align-items: center; justify-content: center; gap: 0.4rem; width: 100%; background: var(--gold); color: #fff; padding: 0.65rem; border-radius: 50px; font-weight: 600; cursor: pointer; border: none; font-size: 0.82rem; transition: all 0.3s; }
        .cart-btn:hover { background: var(--gold-light); }
        .footer { background: #1a1a1a; padding: 4rem 2rem 2rem; color: #aaa; margin-top: 3rem; }
        .footer-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 2rem; }
        .footer-logo { width: 44px; margin-bottom: 1rem; border-radius: 8px; }
        .footer h4 { color: #fff; margin-bottom: 1rem; font-weight: 600; font-size: 0.9rem; }
        .footer a { display: block; color: #888; text-decoration: none; margin-bottom: 0.5rem; font-size: 0.82rem; transition: color 0.3s; }
        .footer a:hover { color: var(--gold-light); }
        .footer-bottom { text-align: center; padding-top: 2rem; border-top: 1px solid #333; color: #666; font-size: 0.78rem; }
        .footer-bottom a { color: var(--gold-light); text-decoration: none; }
        .toast { position: fixed; top: 18px; right: 18px; z-index: 9999; padding: 13px 20px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; box-shadow: 0 8px 25px rgba(0,0,0,0.12); animation: slideIn 0.35s ease; display: flex; align-items: center; gap: 0.5rem; }
        .toast-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .toast-error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(80px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 768px) { .nav-links { display: none; } .products-grid { grid-template-columns: 1fr 1fr; gap: 0.8rem; } .footer-grid { grid-template-columns: 1fr 1fr; } .shop-header { flex-direction: column; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper"><img src="https://ogsun-mache-lakay-blqd.onrender.com/logo.png"
  alt="OGSUN" class="logo-img"><span class="logo-text">OGSUN</span></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Akèy</a>
                <a href="shop.html" class="nav-link active">Boutik</a>
                <a href="cart.html" class="nav-link">Panye</a>
                <a href="account.html" class="nav-link">Kont</a>
                <a href="contact.html" class="nav-link">Kontakte</a>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <a href="cart.html" style="color:var(--text);text-decoration:none;font-size:1.2rem;">🛒</a>
                <a href="account.html" class="nav-btn">Konekte</a>
            </div>
        </div>
    </nav>

    <main class="shop-page">
        <div class="shop-header">
            <h1 class="shop-title">Boutik <span>OGSUN</span></h1>
            <div class="search-box">
                <input type="text" id="shopSearch" placeholder="Rechèche pwodwi...">
                <button onclick="searchProducts()">🔍</button>
            </div>
        </div>
        <div class="products-grid" id="shopProducts"><p style="text-align:center;color:var(--gray);grid-column:1/-1;padding:2rem;">Chajman pwodwi...</p></div>
    </main>

    <footer class="footer">
        <div class="footer-grid">
            <div><img src="logo.png" alt="OGSUN" class="footer-logo"><p style="color:#888;font-size:0.85rem;">Pi bon platfòm e-commerce lokal an Ayiti.</p></div>
            <div><h4>Navigate</h4><a href="index.html">Akèy</a><a href="shop.html">Boutik</a><a href="cart.html">Panye</a></div>
            <div><h4>Enfòmasyon</h4><a href="about.html">Sou Nou</a><a href="contact.html">Kontakte</a><a href="faq.html">FAQ</a></div>
            <div><h4>Sipò</h4><a href="faq.html">Livrezon</a><a href="faq.html">Retounen</a><a href="contact.html">Èd</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 <a href="index.html">OGSUN</a>. Tout dwa rezève.</p></div>
    </footer>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    function showToast(msg,type){type=type||'success';var t=document.createElement('div');t.className='toast toast-'+type;t.innerHTML='<span>'+(type==='success'?'✓':'✕')+'</span> '+msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(80px)';t.style.transition='all 0.3s';setTimeout(function(){t.remove();},300);},2500);}
    function addToCart(n,p){var c=JSON.parse(localStorage.getItem('ogsun-cart')||'[]');var e=c.find(function(i){return i.name===n;});if(e){e.quantity+=1;}else{c.push({name:n,quantity:1,price:p});}localStorage.setItem('ogsun-cart',JSON.stringify(c));showToast(n+' ajoute nan panye!','success');}
    function searchProducts(){var q=document.getElementById('shopSearch').value.toLowerCase();var cards=document.querySelectorAll('.product-card');cards.forEach(function(c){var n=c.querySelector('.product-name')?.textContent.toLowerCase()||'';c.style.display=n.includes(q)||q===''?'':'none';});}
    
    fetch(API+'/products').then(function(r){return r.json();}).then(function(p){
        var g=document.getElementById('shopProducts');
        if(!p||p.length===0){g.innerHTML='<p style="text-align:center;color:var(--gray);grid-column:1/-1;padding:2rem;">Pa gen pwodwi disponib.</p>';return;}
        g.innerHTML=p.map(function(pr){var img=pr.image||pr.image_url||'logo.png';
            return '<a href="product.html?id='+pr.id+'" class="product-card"><div class="product-img-wrap"><img src="'+img+'" alt="'+pr.name+'" class="product-img" onerror="this.src=\'logo.png\'">'+(pr.badge?'<span class="product-badge">'+pr.badge+'</span>':'')+'</div><div class="product-info"><span class="product-cat">'+(pr.category||'')+'</span><h3 class="product-name">'+pr.name+'</h3><div class="product-price"><span class="current-price">$'+(pr.price||0).toFixed(2)+'</span>'+(pr.old_price?'<span class="old-price">$'+pr.old_price.toFixed(2)+'</span>':'')+'</div><button class="cart-btn" onclick="event.preventDefault();event.stopPropagation();addToCart(\''+pr.name+'\','+pr.price+')">Ajoute nan panye</button></div></a>';
        }).join('');
    }).catch(function(){document.getElementById('shopProducts').innerHTML='<p style="text-align:center;color:#c62828;grid-column:1/-1;padding:2rem;">Pa ka chaje pwodwi.</p>';});
    </script>

</body>
</html>
