<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Boutik 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c9a84c">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#c9a84c;--gold-light:#e2c86e;--bg:#fafaf9;--white:#fff;--text:#1a1a1a;--gray:#666;--border:#e8e0d0;--radius:16px;--green:#2e7d32}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0.9rem 2rem;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .nav-container{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .logo-wrapper{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo-img{width:44px;height:44px;object-fit:contain;border-radius:10px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        .logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);letter-spacing:2px}
        .nav-links{display:flex;gap:1.5rem;align-items:center}
        .nav-link{color:var(--gray);text-decoration:none;font-weight:500;font-size:0.9rem}
        .nav-link:hover,.nav-link.active{color:var(--gold)}
        .nav-btn{background:var(--gold);color:#fff;padding:0.6rem 1.5rem;border-radius:50px;font-weight:600;text-decoration:none;font-size:0.9rem}
        .shop-page{padding:7rem 2rem 3rem;max-width:1400px;margin:0 auto}
        .shop-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
        .shop-title{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:800}
        .shop-title span{color:var(--gold)}
        .search-box{display:flex;background:#fff;border:1px solid var(--border);border-radius:50px;overflow:hidden}
        .search-box input{padding:0.7rem 1.2rem;border:none;outline:none;font-family:'Outfit',sans-serif;font-size:0.9rem;min-width:250px}
        .search-box button{background:var(--gold);color:#fff;border:none;padding:0.7rem 1.3rem;cursor:pointer;font-weight:600}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem}
        .product-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.4s;cursor:pointer;text-decoration:none;color:inherit;display:block}
        .product-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,0.1);border-color:var(--gold)}
        .product-img-wrap{aspect-ratio:1;overflow:hidden;background:#f5f0e8;position:relative}
        .product-img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s}
        .product-card:hover .product-img{transform:scale(1.05)}
        .product-badge{position:absolute;top:0.7rem;left:0.7rem;background:var(--gold);color:#fff;padding:0.2rem 0.8rem;border-radius:50px;font-size:0.65rem;font-weight:700;text-transform:uppercase;z-index:2}
        .product-info{padding:1.2rem}
        .product-cat{color:var(--gold);font-size:0.7rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
        .product-name{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;margin:0.3rem 0;font-weight:600}
        .product-price{display:flex;align-items:center;gap:0.5rem;margin:0.5rem 0}
        .current-price{font-size:1.2rem;font-weight:700;color:var(--gold)}
        .old-price{text-decoration:line-through;color:#aaa;font-size:0.85rem}
        .cart-btn{display:block;width:100%;background:var(--gold);color:#fff;padding:0.7rem;border-radius:50px;font-weight:600;cursor:pointer;border:none;text-align:center;transition:all 0.3s}
        .cart-btn:hover{background:var(--gold-light)}
        .footer{background:#1a1a1a;padding:4rem 2rem 2rem;color:#aaa;margin-top:3rem}
        .footer-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2rem}
        .footer h4{color:#fff;margin-bottom:1rem;font-size:0.9rem}
        .footer a{display:block;color:#888;text-decoration:none;margin-bottom:0.5rem;font-size:0.85rem}
        .footer a:hover{color:var(--gold-light)}
        .footer-bottom{text-align:center;padding-top:2rem;border-top:1px solid #333;color:#666;font-size:0.8rem}
        .toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:10px;font-weight:600;font-size:0.9rem;box-shadow:0 8px 25px rgba(0,0,0,0.12);animation:slideIn 0.3s ease}
        .toast-success{background:#e8f5e9;color:var(--green);border:1px solid #c8e6c9}
        @keyframes slideIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
        @media(max-width:768px){.nav-links{display:none}.shop-title{font-size:1.8rem}.footer-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper"><img src="logo.png" alt="OGSUN" class="logo-img"><span class="logo-text">OGSUN</span></a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Akèy</a>
                <a href="shop.html" class="nav-link active">Boutik</a>
                <a href="cart.html" class="nav-link">Panye</a>
                <a href="account.html" class="nav-link">Kont</a>
                <a href="affiliate-login.html" class="nav-link">Afilye</a>
            </div>
            <a href="account.html" class="nav-btn">Konekte</a>
        </div>
    </nav>

    <main class="shop-page">
        <div class="shop-header">
            <h1 class="shop-title">Boutik <span>OGSUN</span></h1>
            <div class="search-box">
                <input type="text" id="shopSearch" placeholder="Rechèche pwodwi...">
                <button onclick="searchProducts()">🔍</button>
            </div>
        </div>
        <div class="products-grid" id="shopProducts"><p style="text-align:center;color:var(--gray);grid-column:1/-1;padding:2rem;">Chajman pwodwi...</p></div>
    </main>

    <footer class="footer">
        <div class="footer-grid">
            <div><img src="logo.png" alt="OGSUN" style="width:44px;margin-bottom:1rem;"><p style="color:#888;">Pi bon platfòm e-commerce lokal an Ayiti.</p></div>
            <div><h4>Navigate</h4><a href="index.html">Akèy</a><a href="shop.html">Boutik</a><a href="cart.html">Panye</a></div>
            <div><h4>Enfòmasyon</h4><a href="about.html">Sou Nou</a><a href="contact.html">Kontakte</a><a href="faq.html">FAQ</a></div>
            <div><h4>Sipò</h4><a href="faq.html">Livrezon</a><a href="faq.html">Retounen</a><a href="contact.html">Èd</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 <a href="index.html">OGSUN</a>. Tout dwa rezève.</p></div>
    </footer>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    
    function showToast(msg) {
        var t = document.createElement('div'); t.className = 'toast toast-success';
        t.innerHTML = '<span>✓</span> ' + msg; document.body.appendChild(t);
        setTimeout(function() { t.remove(); }, 2500);
    }
    
    function addToCart(name, price) {
        var cart = JSON.parse(localStorage.getItem('ogsun-cart') || '[]');
        var existing = cart.find(function(i) { return i.name === name; });
        if (existing) { existing.quantity += 1; }
        else { cart.push({ name: name, quantity: 1, price: price }); }
        localStorage.setItem('ogsun-cart', JSON.stringify(cart));
        showToast(name + ' ajoute nan panye!');
    }
    
    function searchProducts() {
        var query = document.getElementById('shopSearch').value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(function(c) {
            c.style.display = c.querySelector('.product-name').textContent.toLowerCase().includes(query) ? '' : 'none';
        });
    }
    
    fetch(API + '/products').then(function(r) { return r.json(); }).then(function(p) {
        var grid = document.getElementById('shopProducts');
        if (!p.length) { grid.innerHTML = '<p style="text-align:center;color:var(--gray);grid-column:1/-1;padding:2rem;">Pa gen pwodwi.</p>'; return; }
        grid.innerHTML = p.map(function(pr) {
            return '<a href="product.html?id=' + pr.id + '" class="product-card"><div class="product-img-wrap"><img src="' + (pr.image || pr.image_url || 'logo.png') + '" class="product-img" onerror="this.src=\'logo.png\'">' + (pr.badge ? '<span class="product-badge">' + pr.badge + '</span>' : '') + '</div><div class="product-info"><span class="product-cat">' + (pr.category || '') + '</span><h3 class="product-name">' + pr.name + '</h3><div class="product-price"><span class="current-price">$' + (pr.price || 0).toFixed(2) + '</span>' + (pr.old_price ? '<span class="old-price">$' + pr.old_price.toFixed(2) + '</span>' : '') + '</div><span class="cart-btn" onclick="event.preventDefault();event.stopPropagation();addToCart(\'' + pr.name + '\',' + (pr.price || 0) + ')">Ajoute nan panye</span></div></a>';
        }).join('');
    }).catch(function() { document.getElementById('shopProducts').innerHTML = '<p style="text-align:center;color:var(--red);grid-column:1/-1;padding:2rem;">Pa ka chaje pwodwi.</p>'; });
    </script>

</body>
</html>
