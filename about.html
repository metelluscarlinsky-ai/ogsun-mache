<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Pwodwi 2026</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#c9a84c;--gold-light:#e2c86e;--bg:#fafaf9;--white:#fff;--text:#1a1a1a;--gray:#666;--border:#e8e0d0;--radius:16px;--green:#2e7d32}
        body{font-family:'Outfit',sans-serif;background:linear-gradient(180deg,#fafaf9 0%,#f5f0e8 50%,#efe8d8 100%);color:var(--text);line-height:1.7}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0.9rem 2rem;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .nav-container{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .logo-wrapper{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo-img{width:44px;height:44px;object-fit:contain;border-radius:10px}
        .logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);letter-spacing:2px}
        .nav-links{display:flex;gap:1.5rem;align-items:center}
        .nav-link{color:var(--gray);text-decoration:none;font-weight:500;font-size:0.9rem}
        .nav-link:hover{color:var(--gold)}
        .nav-btn{background:var(--gold);color:#fff;padding:0.6rem 1.5rem;border-radius:50px;font-weight:600;text-decoration:none}
        .product-page{padding:7rem 2rem 3rem;max-width:1100px;margin:0 auto}
        .breadcrumb{margin-bottom:1.5rem;color:var(--gray)}
        .breadcrumb a{color:var(--gold);text-decoration:none}
        .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem}
        .product-image{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center}
        .product-image img{width:100%;max-height:400px;object-fit:contain}
        .product-details h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;margin-bottom:0.5rem}
        .product-cat{color:var(--gold);text-transform:uppercase;letter-spacing:2px;font-size:0.8rem;font-weight:600}
        .product-price{font-size:2rem;font-weight:700;color:var(--gold);margin:1rem 0}
        .old-price{text-decoration:line-through;color:#aaa;font-size:1.2rem;margin-left:0.8rem}
        .product-desc{color:var(--gray);line-height:1.8;margin:1rem 0}
        .qty-section{display:flex;align-items:center;gap:1rem;margin:1.5rem 0}
        .qty-btn{width:40px;height:40px;border:1px solid var(--border);background:#fff;cursor:pointer;border-radius:10px;font-size:1.2rem}
        .qty-input{width:60px;text-align:center;border:1px solid var(--border);border-radius:10px;padding:0.5rem;font-family:'Outfit',sans-serif}
        .btn-add{width:100%;padding:1rem;background:var(--gold);color:#fff;border:none;border-radius:50px;font-weight:700;font-size:1.1rem;cursor:pointer;transition:all 0.3s}
        .btn-add:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 10px 25px rgba(201,168,76,0.3)}
        .stock-info{color:var(--green);font-weight:500;margin-top:0.5rem}
        .footer{background:#1a1a1a;padding:4rem 2rem 2rem;color:#aaa;margin-top:4rem}
        .footer-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2rem}
        .footer h4{color:#fff;margin-bottom:1rem;font-size:0.9rem}
        .footer a{display:block;color:#888;text-decoration:none;margin-bottom:0.5rem;font-size:0.85rem}
        .footer a:hover{color:var(--gold-light)}
        .footer-bottom{text-align:center;padding-top:2rem;border-top:1px solid #333;color:#666;font-size:0.8rem}
        .toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:10px;font-weight:600;font-size:0.9rem;box-shadow:0 8px 25px rgba(0,0,0,0.12);animation:slideIn 0.3s ease}
        .toast-success{background:#e8f5e9;color:var(--green);border:1px solid #c8e6c9}
        @keyframes slideIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:translateX(0)}}
        @media(max-width:768px){.product-grid{grid-template-columns:1fr}.nav-links{display:none}.footer-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper"><img src="logo.png" alt="OGSUN" class="logo-img"><span class="logo-text">OGSUN</span></a>
            <div class="nav-links"><a href="index.html" class="nav-link">Akèy</a><a href="shop.html" class="nav-link">Boutik</a><a href="cart.html" class="nav-link">Panye</a><a href="account.html" class="nav-link">Kont</a></div>
            <a href="index.html" class="nav-btn">Akèy</a>
        </div>
    </nav>

    <main class="product-page">
        <div class="breadcrumb"><a href="index.html">Akèy</a> / <a href="shop.html">Boutik</a> / <span id="breadcrumbName">Pwodwi</span></div>
        <div class="product-grid">
            <div class="product-image"><img id="productImage" src="logo.png" alt="Pwodwi"></div>
            <div class="product-details">
                <span class="product-cat" id="productCategory">---</span>
                <h1 id="productName">Chajman...</h1>
                <div class="product-price"><span id="productPrice">$0.00</span><span class="old-price" id="productOldPrice"></span></div>
                <p class="product-desc" id="productDesc">Chajman deskripsyon...</p>
                <div class="qty-section">
                    <button class="qty-btn" onclick="changeQty(-1)">-</button>
                    <input type="number" class="qty-input" id="qty" value="1" min="1" max="20">
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <p class="stock-info" id="productStock"></p>
                <button class="btn-add" onclick="addToCart()">Ajoute nan Panye</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-grid">
            <div><img src="logo.png" alt="OGSUN" style="width:44px;"><p style="color:#888;">Pi bon platfòm e-commerce lokal an Ayiti.</p></div>
            <div><h4>Navigate</h4><a href="index.html">Akèy</a><a href="shop.html">Boutik</a><a href="cart.html">Panye</a></div>
            <div><h4>Enfòmasyon</h4><a href="about.html">Sou Nou</a><a href="contact.html">Kontakte</a><a href="faq.html">FAQ</a></div>
            <div><h4>Sipò</h4><a href="faq.html">Livrezon</a><a href="faq.html">Retounen</a><a href="contact.html">Èd</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 <a href="index.html">OGSUN</a>. Tout dwa rezève.</p></div>
    </footer>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    var productId = new URLSearchParams(window.location.search).get('id') || 1;
    
    function showToast(msg) { var t = document.createElement('div'); t.className = 'toast toast-success'; t.innerHTML = '<span>✓</span> ' + msg; document.body.appendChild(t); setTimeout(function() { t.remove(); }, 2500); }
    function changeQty(d) { var i = document.getElementById('qty'); i.value = Math.max(1, Math.min(20, parseInt(i.value) + d)); }
    
    function addToCart() {
        var name = document.getElementById('productName').textContent;
        var price = parseFloat(document.getElementById('productPrice').textContent.replace('$', ''));
        var qty = parseInt(document.getElementById('qty').value);
        var cart = JSON.parse(localStorage.getItem('ogsun-cart') || '[]');
        var existing = cart.find(function(i) { return i.name === name; });
        if (existing) { existing.quantity += qty; }
        else { cart.push({ name: name, quantity: qty, price: price }); }
        localStorage.setItem('ogsun-cart', JSON.stringify(cart));
        showToast(qty + ' x ' + name + ' ajoute nan panye!');
    }
    
    fetch(API + '/products/' + productId).then(function(r) { return r.json(); }).then(function(p) {
        document.getElementById('productName').textContent = p.name;
        document.getElementById('productCategory').textContent = p.category || '';
        document.getElementById('productPrice').textContent = '$' + (p.price || 0).toFixed(2);
        document.getElementById('productOldPrice').textContent = p.old_price ? '$' + p.old_price.toFixed(2) : '';
        document.getElementById('productDesc').textContent = p.description || 'Pa gen deskripsyon.';
        document.getElementById('productStock').textContent = '✅ ' + (p.stock || 0) + ' an stock';
        document.getElementById('productImage').src = p.image || p.image_url || 'logo.png';
        document.getElementById('breadcrumbName').textContent = p.name;
    }).catch(function() { document.getElementById('productName').textContent = 'Pa ka chaje pwodwi'; });
    </script>

</body>
</html>
