<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Pwodwi 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #b8960f; --gold-light: #d4af37; --bg: #fafaf9; --white: #fff; --text: #1a1a1a; --gray: #666; --border: #e8e0d0; --radius: 14px; --green: #2e7d32; }
        body { font-family: 'Outfit', 'Segoe UI', Arial, sans-serif; background: linear-gradient(180deg, #fafaf9 0%, #f5f0e8 50%, #efe8d8 100%); color: var(--text); line-height: 1.7; }
        .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 0.9rem 2rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-container { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
        .logo-wrapper { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .logo-img { width: 42px; height: 42px; object-fit: contain; border-radius: 8px; }
        .logo-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-link { color: var(--gray); text-decoration: none; font-weight: 500; font-size: 0.88rem; }
        .nav-link:hover { color: var(--gold); }
        .product-page { padding: 7rem 2rem 3rem; max-width: 1000px; margin: 0 auto; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
        .product-img-main { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; text-align: center; }
        .product-img-main img { width: 100%; max-height: 400px; object-fit: contain; }
        .product-details h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; }
        .product-details .cat { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; font-weight: 600; }
        .product-details .price { font-size: 2rem; font-weight: 700; color: var(--gold); margin: 1rem 0; }
        .product-details .old-price { text-decoration: line-through; color: #aaa; font-size: 1.2rem; margin-left: 0.8rem; }
        .product-details .desc { color: var(--gray); line-height: 1.8; margin: 1rem 0; }
        .qty-section { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
        .qty-btn { width: 40px; height: 40px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 1.2rem; border-radius: 10px; }
        .qty-input { width: 60px; text-align: center; border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem; font-family: 'Outfit', sans-serif; }
        .add-btn { width: 100%; background: var(--gold); color: #fff; border: none; padding: 1rem; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1.05rem; }
        .add-btn:hover { background: var(--gold-light); }
        .stock-info { color: var(--green); font-weight: 500; margin-top: 0.5rem; }
        .footer { background: #1a1a1a; padding: 4rem 2rem 2rem; color: #aaa; margin-top: 3rem; }
        .footer-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 2rem; }
        .footer h4 { color: #fff; margin-bottom: 1rem; font-weight: 600; }
        .footer a { display: block; color: #888; text-decoration: none; margin-bottom: 0.5rem; font-size: 0.82rem; }
        .footer a:hover { color: var(--gold-light); }
        .footer-bottom { text-align: center; padding-top: 2rem; border-top: 1px solid #333; color: #666; font-size: 0.78rem; }
        .footer-bottom a { color: var(--gold-light); text-decoration: none; }
        .toast { position: fixed; top: 18px; right: 18px; z-index: 9999; padding: 13px 20px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; box-shadow: 0 8px 25px rgba(0,0,0,0.12); animation: slideIn 0.35s ease; display: flex; align-items: center; gap: 0.5rem; }
        .toast-success { background: #e8f5e9; color: var(--green); border: 1px solid #c8e6c9; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(80px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 768px) { .product-grid { grid-template-columns: 1fr; } .nav-links { display: none; } .footer-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper" <img src="https://ogsun-mache-lakay-blqd.onrender.com/logo.png"
alt="OGSUN" class="logo-img"><span class="logo-text">OGSUN</span></a>
            <div class="nav-links"><a href="index.html" class="nav-link">Akèy</a><a href="shop.html" class="nav-link">Boutik</a><a href="cart.html" class="nav-link">Panye</a><a href="account.html" class="nav-link">Kont</a></div>
            <a href="index.html" class="nav-btn">Akèy</a>
        </div>
    </nav>

    <main class="product-page">
        <div class="product-grid">
            <div class="product-img-main"><img src="https://ogsun-mache-lakay-blqd.onrender.com/logo.png"
 alt="Pwodwi" id="productImage"></div>
            <div class="product-details">
                <span class="cat" id="productCategory"></span>
                <h1 id="productName">Chajman...</h1>
                <div class="price"><span id="productPrice"></span><span class="old-price" id="productOldPrice"></span></div>
                <p class="desc" id="productDesc">Chajman deskripsyon...</p>
                <div class="qty-section">
                    <button class="qty-btn" onclick="changeQty(-1)">-</button>
                    <input type="number" class="qty-input" id="qty" value="1" min="1" max="10">
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
                <p class="stock-info" id="productStock"></p>
                <button class="add-btn" onclick="addToCart()">Ajoute nan Panye</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-grid">
            <div>
<p style="color:#888;">Pi bon platfòm e-commerce lokal an Ayiti.</p></div>
            <div><h4>Navigate</h4><a href="index.html">Akèy</a><a href="shop.html">Boutik</a><a href="cart.html">Panye</a></div>
            <div><h4>Enfòmasyon</h4><a href="about.html">Sou Nou</a><a href="contact.html">Kontakte</a><a href="faq.html">FAQ</a></div>
            <div><h4>Sipò</h4><a href="faq.html">Livrezon</a><a href="faq.html">Retounen</a><a href="contact.html">Èd</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 <a href="index.html">OGSUN</a>. Tout dwa rezève.</p></div>
    </footer>

    <script>
    var API = 'https://ogsun-mache-lakay-blqd.onrender.com/api';
    var productId = new URLSearchParams(window.location.search).get('id') || 1;
    function showToast(m){var t=document.createElement('div');t.className='toast toast-success';t.innerHTML='<span>✓</span> '+m;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(80px)';t.style.transition='all 0.3s';setTimeout(function(){t.remove();},300);},2500);}
    function changeQty(d){var i=document.getElementById('qty');var v=parseInt(i.value)+d;i.value=Math.max(1,Math.min(10,v));}
    function addToCart(){var n=document.getElementById('productName').textContent;var p=parseFloat(document.getElementById('productPrice').textContent.replace('$',''));var q=parseInt(document.getElementById('qty').value);var c=JSON.parse(localStorage.getItem('ogsun-cart')||'[]');var e=c.find(function(i){return i.name===n;});if(e){e.quantity+=q;}else{c.push({name:n,quantity:q,price:p});}localStorage.setItem('ogsun-cart',JSON.stringify(c));showToast(q+' x '+n+' ajoute nan panye!');}
    fetch(API+'/products/'+productId).then(function(r){return r.json();}).then(function(p){document.getElementById('productName').textContent=p.name;document.getElementById('productCategory').textContent=p.category||'';document.getElementById('productPrice').textContent='$'+(p.price||0).toFixed(2);document.getElementById('productOldPrice').textContent=p.old_price?'$'+p.old_price.toFixed(2):'';document.getElementById('productDesc').textContent=p.description||'';document.getElementById('productStock').textContent='✅ '+(p.stock||0)+' an stock';document.getElementById('productImage').src=p.image||p.image_url||'logo.png';}).catch(function(){document.getElementById('productName').textContent='Pa ka chaje pwodwi';});
    </script>

</body>
</html>
