<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGSUN | Panye 2026</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--gold:#c9a84c;--gold-light:#e2c86e;--bg:#fafaf9;--white:#fff;--text:#1a1a1a;--gray:#666;--border:#e8e0d0;--radius:16px;--green:#2e7d32;--red:#c62828}
        body{font-family:'Outfit',sans-serif;background:linear-gradient(180deg,#fafaf9 0%,#f5f0e8 50%,#efe8d8 100%);color:var(--text);line-height:1.7;min-height:100vh}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0.9rem 2rem;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .nav-container{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .logo-wrapper{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
        .logo-img{width:44px;height:44px;object-fit:contain;border-radius:10px}
        .logo-text{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:var(--gold);letter-spacing:2px}
        .nav-links{display:flex;gap:1.5rem;align-items:center}
        .nav-link{color:var(--gray);text-decoration:none;font-weight:500;font-size:0.9rem}
        .nav-link:hover,.nav-link.active{color:var(--gold)}
        .nav-btn{background:var(--gold);color:#fff;padding:0.6rem 1.5rem;border-radius:50px;font-weight:600;text-decoration:none}
        .cart-page{padding:7rem 2rem 3rem;max-width:800px;margin:0 auto}
        .cart-title{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;margin-bottom:1.5rem}
        .cart-title span{color:var(--gold)}
        .cart-empty{text-align:center;padding:4rem;background:#fff;border-radius:var(--radius);border:1px solid var(--border)}
        .cart-empty h3{margin-bottom:1rem}
        .cart-item{display:flex;gap:1rem;align-items:center;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:0.8rem}
        .cart-item img{width:80px;height:80px;object-fit:contain;background:#f5f0e8;border-radius:10px;padding:0.5rem}
        .cart-item-info{flex:1}
        .cart-item-name{font-weight:600}
        .cart-item-price{color:var(--gray);font-size:0.9rem}
        .qty-control{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem}
        .qty-btn{width:28px;height:28px;border:1px solid var(--border);background:#fff;cursor:pointer;border-radius:6px;font-size:1rem}
        .qty-input{width:45px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:0.3rem}
        .cart-item-total{font-weight:700;color:var(--gold)}
        .remove-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:1.3rem}
        .remove-btn:hover{color:var(--red)}
        .cart-summary{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-top:1.5rem}
        .summary-row{display:flex;justify-content:space-between;margin-bottom:0.5rem;color:var(--gray)}
        .summary-total{display:flex;justify-content:space-between;font-size:1.3rem;font-weight:700;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
        .summary-total span:last-child{color:var(--gold)}
        .btn{display:block;width:100%;padding:0.9rem;border-radius:50px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;border:none;transition:all 0.3s}
        .btn-gold{background:var(--gold);color:#fff;margin-top:1rem}
        .btn-gold:hover{background:var(--gold-light)}
        .btn-whatsapp{background:#25D366;color:#fff;margin-top:0.5rem;display:flex;align-items:center;justify-content:center;gap:0.5rem}
        .continue-link{color:var(--gold);text-decoration:none;font-weight:500;display:inline-block;margin-top:1rem}
        .footer{background:#1a1a1a;padding:4rem 2rem 2rem;color:#aaa;margin-top:3rem}
        .footer-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2rem}
        .footer h4{color:#fff;margin-bottom:1rem;font-size:0.9rem}
        .footer a{display:block;color:#888;text-decoration:none;margin-bottom:0.5rem;font-size:0.85rem}
        .footer a:hover{color:var(--gold-light)}
        .footer-bottom{text-align:center;padding-top:2rem;border-top:1px solid #333;color:#666;font-size:0.8rem}
        @media(max-width:768px){.nav-links{display:none}.cart-item{flex-wrap:wrap}.footer-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper"><img src="logo.png" alt="OGSUN" class="logo-img"><span class="logo-text">OGSUN</span></a>
            <div class="nav-links"><a href="index.html" class="nav-link">Akèy</a><a href="shop.html" class="nav-link">Boutik</a><a href="cart.html" class="nav-link active">Panye</a><a href="account.html" class="nav-link">Kont</a></div>
            <a href="account.html" class="nav-btn">Konekte</a>
        </div>
    </nav>

    <main class="cart-page">
        <h1 class="cart-title">Panye <span>Mwen</span></h1>
        <div id="cartContent"></div>
        <a href="shop.html" class="continue-link">← Kontinye Achte</a>
    </main>

    <footer class="footer">
        <div class="footer-grid">
            <div><img src="logo.png" alt="OGSUN" style="width:44px;"><p style="color:#888;">Pi bon platfòm e-commerce lokal an Ayiti.</p></div>
            <div><h4>Navigate</h4><a href="index.html">Akèy</a><a href="shop.html">Boutik</a><a href="cart.html">Panye</a></div>
            <div><h4>Enfòmasyon</h4><a href="about.html">Sou Nou</a><a href="contact.html">Kontakte</a><a href="faq.html">FAQ</a></div>
            <div><h4>Sipò</h4><a href="faq.html">Livrezon</a><a href="faq.html">Retounen</a><a href="contact.html">Èd</a></div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 <a href="index.html">OGSUN</a>. Tout dwa rezève.</p></div>
    </footer>

    <script>
    var cart = JSON.parse(localStorage.getItem('ogsun-cart') || '[]');
    function saveCart() { localStorage.setItem('ogsun-cart', JSON.stringify(cart)); renderCart(); }
    
    function renderCart() {
        var c = document.getElementById('cartContent');
        if (cart.length === 0) {
            c.innerHTML = '<div class="cart-empty"><h3>🛒 Panye w vid</h3><p>Ajoute pwodwi nan boutik la!</p><a href="shop.html" class="btn btn-gold" style="margin-top:1rem;">Ale nan Boutik</a></div>';
            return;
        }
        var total = 0;
        var html = '';
        cart.forEach(function(item, i) {
            var itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += '<div class="cart-item"><img src="logo.png" alt="'+item.name+'"><div class="cart-item-info"><div class="cart-item-name">'+item.name+'</div><div class="cart-item-price">$'+item.price.toFixed(2)+' /inite</div><div class="qty-control"><button class="qty-btn" onclick="updateQty('+i+',-1)">-</button><input type="number" class="qty-input" value="'+item.quantity+'" onchange="setQty('+i+',this.value)"><button class="qty-btn" onclick="updateQty('+i+',1)">+</button></div></div><div class="cart-item-total">$'+itemTotal.toFixed(2)+'</div><button class="remove-btn" onclick="removeItem('+i+')">✕</button></div>';
        });
        html += '<div class="cart-summary"><div class="summary-row"><span>Sou-total</span><span>$'+total.toFixed(2)+'</span></div><div class="summary-row"><span>Livrezon</span><span>Kalkile nan peman</span></div><div class="summary-total"><span>Total Estimatif</span><span>$'+total.toFixed(2)+'</span></div><a href="checkout.html" class="btn btn-gold">Fè Kòmand</a><button class="btn btn-whatsapp" onclick="orderWhatsApp()"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" style="width:20px;"> Kòmande sou WhatsApp</button></div>';
        c.innerHTML = html;
    }
    
    function updateQty(i, change) { cart[i].quantity = Math.max(1, cart[i].quantity + change); saveCart(); }
    function setQty(i, val) { cart[i].quantity = Math.max(1, parseInt(val) || 1); saveCart(); }
    function removeItem(i) { cart.splice(i, 1); saveCart(); }
    function orderWhatsApp() {
        var pl = ''; cart.forEach(function(it, idx) { pl += (idx+1) + '. ' + it.name + ' x' + it.quantity + ' = $' + (it.price*it.quantity).toFixed(2) + '%0A'; });
        var msg = encodeURIComponent('*NOUVO KÒMAND OGSUN*%0A%0A*Pwodwi:*%0A' + pl + '%0A*Total:* $' + cart.reduce(function(s,i){return s+(i.price*i.quantity);},0).toFixed(2));
        window.open('https://wa.me/50932924776?text='+msg, '_blank');
    }
    renderCart();
    </script>

</body>
</html>
